name: Build and Release VectorP

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: VectorP-Linux
            vcpkg_triplet: x64-linux
          - os: windows-latest
            artifact_name: VectorP-Windows
            vcpkg_triplet: x64-windows
          - os: macos-latest
            artifact_name: VectorP-macOS

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # --- 1. INSTALL DEPENDENCIES ---

    - name: Install Linux System Deps
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxrandr-dev libudev-dev libgl1-mesa-dev libflac-dev libogg-dev libvorbis-dev libopenal-dev libpthread-stubs0-dev

    - name: Install SFML 3.0 via vcpkg (Windows/Linux)
      if: runner.os != 'macOS'
      run: |
        vcpkg install sfml:os-triplet
      env:
        vcpkg_triplet: ${{ matrix.vcpkg_triplet }}

    - name: Install SFML 3.0 via Brew (macOS)
      if: runner.os == 'macOS'
      run: brew install sfml

    # --- 2. CONFIGURE & BUILD ---

    - name: Configure CMake
      shell: bash
      run: |
        # Point CMake to vcpkg for Windows/Linux
        if [ "${{ runner.os }}" == "macOS" ]; then
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
        else
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
        fi

    - name: Build
      shell: bash
      run: cmake --build build --config Release

    # --- 3. PACKAGE ---

    - name: Package Assets
      shell: bash
      run: |
        mkdir -p output
        if [ "${{ runner.os }}" == "Windows" ]; then
          cp build/Release/*.exe output/ 2>/dev/null || cp build/*.exe output/
          # Include DLLs from vcpkg so the exe actually runs
          cp $VCPKG_INSTALLATION_ROOT/installed/${{ matrix.vcpkg_triplet }}/bin/*.dll output/ 2>/dev/null || true
          7z a "${{ matrix.artifact_name }}.zip" ./output/*
        else
          # Find the executable and package it
          find build -maxdepth 2 -type f -executable -exec cp {} output/ \;
          tar -czvf "${{ matrix.artifact_name }}.tar.gz" -C output .
        fi

    # --- 4. UPLOAD ---

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          *.zip
          *.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
