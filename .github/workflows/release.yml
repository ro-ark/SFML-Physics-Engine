on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-20.04
            artifact_name: VectorP-Linux
          - os: windows-latest
            artifact_name: VectorP-Windows
          - os: macos-latest
            artifact_name: VectorP-macOS

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      shell: bash
      run: |
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
        $(if [ "${{ matrix.os }}" == "macos-latest" ]; then echo "-DCMAKE_OSX_ARCHITECTURES='arm64;x86_64'"; fi)

    - name: Build
      shell: bash
      run: cmake --build build --config Release

    - name: Package
      shell: bash
      run: |
        # Create a clean workspace for the binary
        mkdir -p output
        
        if [ "${{ runner.os }}" == "Windows" ]; then
          # Windows CMake usually puts binaries in a 'Release' subfolder
          cp build/Release/*.exe output/ || cp build/*.exe output/
          7z a "${{ matrix.artifact_name }}.zip" ./output/*
        else
          # Linux/macOS usually put them in the root of the build folder
          # We search for the binary specifically
          find build -maxdepth 2 -type f -executable -exec cp {} output/ \;
          tar -czvf "${{ matrix.artifact_name }}.tar.gz" -C output .
        fi

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: |
          *.zip
          *.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
